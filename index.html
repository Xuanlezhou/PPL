<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuanle — Class Schedule Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F5F0; --card: #FFFFFF; --accent: #C8553D; --accent-light: #F5E8E4;
    --text: #1A1A18; --muted: #7A7870; --border: #E2DED6; --input-bg: #F7F5F0;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--text); color: #fff; padding: 14px 24px; position: relative; overflow: hidden; }
  header::before { content:''; position:absolute; top:-60px; right:-60px; width:240px; height:240px; border-radius:50%; background:var(--accent); opacity:0.18; }
  header::after  { content:''; position:absolute; bottom:-40px; left:30%; width:160px; height:160px; border-radius:50%; background:var(--accent); opacity:0.10; }
  .header-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
  header h1 { font-family:'DM Serif Display',serif; font-size:clamp(18px,3vw,26px); font-weight:400; letter-spacing:-0.5px; line-height:1.1; margin-bottom:10px; }
  header h1 span { color: var(--accent); }
  .header-meta { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .badge { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:100px; padding:3px 10px; font-size:11px; font-weight:300; color:rgba(255,255,255,0.8); }
  .badge strong { color:#fff; font-weight:500; }
  .page-layout { display:flex; align-items:stretch; }
  main { flex:1; min-width:0; max-width:760px; margin:0 auto; padding:24px 24px 60px; }
  .month-group { margin-bottom:28px; }
  .month-title { font-family:'DM Serif Display',serif; font-size:22px; font-weight:400; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .month-count { font-family:'DM Sans',sans-serif; font-size:12px; background:var(--accent-light); color:var(--accent); border-radius:100px; padding:2px 10px; font-weight:500; }
  .week-current .month-title { color:var(--accent); }
  .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle; margin-bottom:1px; }
  .class-card {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; display:flex; flex-direction:column; gap:6px;
    transition:box-shadow 0.2s, border-color 0.2s;
  }
  .class-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); border-color:#ccc; }
  .class-card:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(200,85,61,0.12); }
  .card-past { opacity:0.45; filter:grayscale(30%); }
  .card-current { border-left:3px solid var(--accent) !important; box-shadow:0 0 0 2px rgba(200,85,61,0.15); }
  .card-current .card-date { color:var(--accent); }
  .card-date { font-size:11px; font-weight:500; color:var(--text); }
  .card-sub  { font-size:10px; color:var(--muted); margin-bottom:2px; }
  .dur-badge { font-size:9px; font-weight:500; background:var(--accent-light); color:var(--accent); border-radius:100px; padding:1px 6px; }
  .notes-area {
    width:100%; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:300;
    color:var(--text); background:var(--input-bg); border:1px solid var(--border);
    border-radius:6px; padding:6px 8px; resize:none; min-height:80px; line-height:1.5;
    overflow:hidden; transition:border-color 0.2s; flex:1;
  }
  .notes-area:focus { outline:none; border-color:var(--accent); background:#fff; }
  .notes-area::placeholder { color:#B5B2AB; }
  .actions { display:flex; align-items:center; gap:14px; margin-top:32px; padding-top:24px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .btn-save { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:#fff; background:var(--accent); border:none; border-radius:100px; padding:11px 28px; cursor:pointer; }
  .btn-save:hover { opacity:0.88; }
  .btn-print { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:400; color:var(--muted); background:transparent; border:1px solid var(--border); border-radius:100px; padding:11px 28px; cursor:pointer; }
  .btn-print:hover { background:var(--border); color:var(--text); }
  .saved-toast { font-size:13px; color:#3A7D44; background:#EAF5EC; border-radius:100px; padding:6px 16px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .saved-toast.show { opacity:1; }
  .summary-panel { width:360px; flex-shrink:0; background:var(--card); border-left:1px solid var(--border); padding:28px 24px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .panel-title { font-family:'DM Serif Display',serif; font-size:16px; font-weight:400; }
  .btn-refresh { font-size:18px; background:transparent; border:1px solid var(--border); border-radius:50%; width:32px; height:32px; cursor:pointer; color:var(--muted); display:flex; align-items:center; justify-content:center; }
  .btn-refresh:hover { background:var(--bg); color:var(--text); }
  .btn-refresh.spinning { animation:spin 0.6s linear; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .panel-empty { font-size:13px; color:var(--muted); font-weight:300; text-align:center; padding:20px 0; }
  .panel-section { margin-bottom:20px; }
  .panel-section-title { font-size:9px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .panel-item { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; border-radius:8px; margin-bottom:4px; font-size:12.5px; font-weight:300; color:var(--text); background:var(--bg); gap:8px; }
  .panel-item.done    { background:#EAF5EC; color:#2A6B35; }
  .panel-item.planned { background:#EEF4FF; color:#2A4A8A; }
  .panel-item-label { flex:1; line-height:1.4; }
  .panel-count { font-size:12px; font-weight:500; background:var(--accent-light); color:var(--accent); border-radius:100px; padding:1px 8px; white-space:nowrap; }
  .panel-item.done    .panel-count { background:#C8EDD0; color:#2A6B35; }
  .panel-item.planned .panel-count { background:#C8D8F5; color:#2A4A8A; }
  footer { text-align:center; font-size:12px; color:var(--muted); padding:32px; border-top:1px solid var(--border); }
  @media (max-width:860px) { .page-layout{flex-direction:column} .summary-panel{width:100%;border-left:none;border-top:1px solid var(--border);position:static;height:auto} }
  @media (max-width:520px) { main{padding:20px 14px 60px} }
  @media print { header{background:#fff;color:#000} .btn-save,.btn-print,.actions,.summary-panel{display:none} .class-card{break-inside:avoid} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <h1>Xuanle<br><span>Class Schedule Plan</span></h1>
        <div class="header-meta">
          <span class="badge"><strong>31</strong> sessions booked</span>
          <span class="badge"><strong>Apr 23</strong> — <strong>May 31, 2026</strong></span>
          <span class="badge">&#9992; <strong>N349ME</strong> &middot; <strong>N445AF</strong> &middot; <strong>N488BA</strong></span>
          <span class="badge">Updated <strong id="last-updated">—</strong></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:8px;">
        <button onclick="saveNotes()" style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#fff;background:var(--accent);border:none;border-radius:100px;padding:10px 24px;cursor:pointer;">Save &amp; sync</button>
        <span class="saved-toast" id="toast-top" style="color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.15);opacity:0;"></span>
      </div>
    </div>
  </div>
</header>

<div class="page-layout">
  <main>
    <div id="schedule"></div>
    <div class="actions">
      <button class="btn-save" onclick="saveNotes()">Save &amp; sync</button>
      <button class="btn-print" onclick="window.print()">Print / PDF</button>
      <span class="saved-toast" id="toast"></span>
      <span class="saved-toast" id="load-status" style="color:var(--muted);background:transparent;opacity:0;"></span>
    </div>
  </main>

  <aside class="summary-panel">
    <div class="panel-header">
      <div class="panel-title">Progress tracker</div>
      <button class="btn-refresh" onclick="buildSummary()" title="Refresh">&#8635;</button>
    </div>
    <div class="panel-empty" id="panel-empty">Hit refresh to scan your notes.</div>
    <div id="panel-list"></div>
  </aside>
</div>

<footer>Xuanle Zhou &middot; Class Schedule Plan &middot; <span id="today"></span></footer>

// ── GOOGLE SHEETS SYNC ────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEhyAPHydRU4xN3Iyqfwq2qvqzPsAZTg0A1oY8nqM35_oNBRJd5Gd3V9Gfyh_ykf_g/exec';
let notes = {};

function jsonp(url, timeoutMs) {
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject) {
    var id = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, timeoutMs);
    function cleanup(){ clearTimeout(timer); delete window[id]; if(script.parentNode) script.parentNode.removeChild(script); }
    window[id] = function(data){ cleanup(); resolve(data); };
    script.onerror = function(){ cleanup(); reject(new Error('error')); };
    script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + id + '&t=' + Date.now();
    document.head.appendChild(script);
  });
}

function setStatus(msg, fade) {
  if(fade === undefined) fade = true;
  var el = document.getElementById('load-status');
  if(!el) return;
  el.textContent = msg; el.style.opacity = '1';
  if(fade) setTimeout(function(){ el.style.opacity = '0'; }, 3000);
}

function loadNotes() {
  try { var c = localStorage.getItem('xz_notes_cache'); if(c) notes = JSON.parse(c); } catch(e) {}
  var saved = localStorage.getItem('xz_last_updated');
  if(saved){ var lu=document.getElementById('last-updated'); if(lu) lu.textContent=saved; }
  renderSchedule(); buildSummary(); scrollToCurrentWeek();

  setStatus('Syncing\u2026', false);
  jsonp(SCRIPT_URL)
    .then(function(fresh){
      if(fresh && typeof fresh === 'object' && Object.keys(fresh).length > 0){
        notes = fresh;
        localStorage.setItem('xz_notes_cache', JSON.stringify(notes));
        var str = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
                  new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        localStorage.setItem('xz_last_updated', str);
        var luEl=document.getElementById('last-updated'); if(luEl) luEl.textContent=str;
        renderSchedule(); buildSummary();
        setStatus('Synced \u2713');
      } else { setStatus('Loaded from cache'); }
    })
    .catch(function(){ setStatus('Loaded from cache'); });
}

var autoSaveTimer = null;
function scheduleAutoSave(){ clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(function(){ saveNotes(true); }, 1500); }

function saveNotes(silent) {
  classes.forEach(function(c){
    var el = document.getElementById('note_' + c.key);
    if(el) notes[c.key] = el.value;
  });
  localStorage.setItem('xz_notes_cache', JSON.stringify(notes));
  var str = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
            new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('xz_last_updated', str);
  var luEl=document.getElementById('last-updated'); if(luEl) luEl.textContent=str;

  if(!silent){
    var t=document.getElementById('toast'); t.textContent='Saved! \u2713'; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000);
    var tt=document.getElementById('toast-top'); if(tt){tt.textContent='Saved! \u2713';tt.style.opacity='1';setTimeout(function(){tt.style.opacity='0';},2000);}
  } else {
    var tt2=document.getElementById('toast-top'); if(tt2){tt2.textContent='Auto-saved';tt2.style.opacity='0.6';setTimeout(function(){tt2.style.opacity='0';},1500);}
  }

  jsonp(SCRIPT_URL + '?action=save&data=' + encodeURIComponent(JSON.stringify(notes)))
    .then(function(){ if(!silent) setStatus('Synced to Sheets \u2713'); })
    .catch(function(){ if(!silent) setStatus('Saved locally (Sheets unreachable)'); });
}

// ── TIME HELPERS ──────────────────────────────────────────────────────────
function parseClassTime(c) {
  var parts = c.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!parts) return new Date(c.date);
  var h=parseInt(parts[1]), m=parseInt(parts[2]), ap=parts[3].toUpperCase();
  if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0;
  var d=new Date(c.date); d.setHours(h,m,0,0); return d;
}

// ── RENDER ────────────────────────────────────────────────────────────────
document.getElementById('today').textContent = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

function renderSchedule() {
  var container = document.getElementById('schedule');
  container.innerHTML = '';
  var now = new Date();

  groupByWeek(classes).forEach(function(wk){
    var group = document.createElement('div');
    group.className = 'month-group';
    var hasCur = wk.items.some(function(c){ return new Date(c.date).toDateString()===now.toDateString(); });
    if(hasCur) group.classList.add('week-current');

    var title = document.createElement('div');
    title.className = 'month-title';
    title.innerHTML = wk.label + ' <span class="month-count">' + wk.items.length + ' class' + (wk.items.length>1?'es':'') + '</span>';
    group.appendChild(title);

    var cols = Math.min(wk.items.length, 3);
    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat('+cols+',1fr);gap:8px;margin-bottom:8px;';

    wk.items.forEach(function(c){
      var classTime = parseClassTime(c);
      var isToday   = new Date(c.date).toDateString() === now.toDateString();
      var isPast    = classTime <= now;

      // ── BUILD CARD ENTIRELY WITH DOM (no innerHTML for the textarea) ──
      var card = document.createElement('div');
      card.className = 'class-card';
      if(isPast && !isToday) card.classList.add('card-past');
      if(isToday)            card.classList.add('card-current');

      // Date row
      var dateDiv = document.createElement('div');
      dateDiv.className = 'card-date';
      dateDiv.innerHTML = '<span class="dot"></span>' + c.date +
        ' <span class="dur-badge">' + c.duration + '</span>';
      card.appendChild(dateDiv);

      // Sub row
      var subDiv = document.createElement('div');
      subDiv.className = 'card-sub';
      subDiv.textContent = c.day + ' \u00b7 ' + c.time + ' \u00b7 ' + c.aircraft + (c.instructor ? ' \u00b7 ' + c.instructor : '');
      card.appendChild(subDiv);

      // Textarea — value set here so notes are visible
      var ta = document.createElement('textarea');
      ta.className = 'notes-area';
      ta.id = 'note_' + c.key;
      ta.placeholder = 'Notes\u2026';
      ta.value = notes[c.key] || '';   // ← this is what was broken before

      ta.addEventListener('input', function(){
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        showSuggestion(this);
        liveScan();
        scheduleAutoSave();
      });
      ta.addEventListener('keydown', function(e){
        if(e.key==='Tab' && ta._suggestion){
          e.preventDefault();
          var val=this.value, d=Math.max(val.lastIndexOf('\n'),val.lastIndexOf(','));
          if(d===-1){ this.value=ta._suggestion; }
          else { var b=val.slice(0,d+1),sp=val.slice(d+1).match(/^\s*/)[0]; this.value=b+sp+ta._suggestion; }
          ta._suggestion=null;
          this.style.height='auto'; this.style.height=this.scrollHeight+'px';
          liveScan();
        }
      });
      setTimeout(function(){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }, 0);
      card.appendChild(ta);

      grid.appendChild(card);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });
}

function groupByWeek(arr) {
  var weeks=[], map={};
  arr.forEach(function(c){
    var d=new Date(c.date), day=d.getDay();
    var mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
    var sun=new Date(mon); sun.setDate(mon.getDate()+6);
    function f(dt){ return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    var key=mon.toISOString().slice(0,10);
    if(!map[key]){ map[key]={label:'Week of '+f(mon)+' \u2013 '+f(sun),items:[]}; weeks.push(map[key]); }
    map[key].items.push(c);
  });
  return weeks;
}

function scrollToCurrentWeek(){
  var cur=document.querySelector('.week-current');
  if(cur) setTimeout(function(){ cur.scrollIntoView({behavior:'smooth',block:'start'}); },300);
}

var KEYWORDS = [
  {label:'Normal takeoffs',            terms:['normal takeoff','normal t/o','nto','takeoff','take off','t/o']},
  {label:'Normal landings',            terms:['normal landing','normal ldg','nldg','landing','ldg','full stop']},

  {label:'Power-on stalls',            terms:['power on stall','power-on stall','pons','pwr on stall']},
  {label:'Steep turns',                terms:['steep turn','steep turns','45 degree','45 bank','steep']},

var AC_TERMS = [];
KEYWORDS.forEach(function(kw){ kw.terms.forEach(function(t){ AC_TERMS.push({term:t,label:kw.label}); }); });

function showSuggestion(ta){
  var segs=ta.value.split(/[\n,]/), cur=segs[segs.length-1].toLowerCase().trim();
  if(cur.length<2){ ta._suggestion=null; return; }
  var m=AC_TERMS.find(function(t){ return t.term.startsWith(cur)&&t.term!==cur; });
  var lm=!m&&KEYWORDS.find(function(kw){ return kw.label.toLowerCase().startsWith(cur)&&kw.label.toLowerCase()!==cur; });
  ta._suggestion = m ? m.term : (lm ? lm.label : null);
}

function liveScan(){ buildSummary(); }

function kwMatches(kw,txt){
  return kw.terms.some(function(term){
    var base=term.replace(/s$/,'');
    return new RegExp('\\b'+base.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'s?\\b','i').test(txt);
  });
}

// ── SUMMARY PANEL ─────────────────────────────────────────────────────────
function buildSummary(){
  var btn=document.querySelector('.btn-refresh');
  if(btn){ btn.classList.add('spinning'); setTimeout(function(){ btn.classList.remove('spinning'); },400); }
  var panelEmpty=document.getElementById('panel-empty'), panelList=document.getElementById('panel-list');
  panelList.innerHTML=''; panelEmpty.style.display='none';
  var now=new Date();
  var past=classes.filter(function(c){ return parseClassTime(c)<=now; });
  var future=classes.filter(function(c){ return parseClassTime(c)>now; });
  var practiced=[],toPractice=[],notYet=[];
  KEYWORDS.forEach(function(kw){
    var pc=past.filter(function(c){ var t=(notes[c.key]||'').toLowerCase(); return t.trim()&&kwMatches(kw,t); }).length;
    var pl=future.filter(function(c){ var el=document.getElementById('note_'+c.key); var t=(el?el.value:(notes[c.key]||'')).toLowerCase(); return t.trim()&&kwMatches(kw,t); }).length;
    if(pc>0) practiced.push({label:kw.label,count:pc});
    else if(pl>0) toPractice.push({label:kw.label,count:pl});
    else notYet.push({label:kw.label});
  });
  function make(title,items,cls){
    if(!items.length) return;
    var sec=document.createElement('div'); sec.className='panel-section';
    sec.innerHTML='<div class="panel-section-title">'+title+' ('+items.length+')</div>';
    items.forEach(function(item){
      var el=document.createElement('div'); el.className='panel-item '+cls;
      el.innerHTML='<span class="panel-item-label">'+item.label+'</span>'+(item.count?'<span class="panel-count">'+item.count+'x</span>':'');
      sec.appendChild(el);
    });
    panelList.appendChild(sec);
  }
  make('Practiced',practiced.sort(function(a,b){ return b.count-a.count; }),'done');
  make('To practice',toPractice,'planned');
  make('Not yet',notYet,'');
  if(!practiced.length&&!toPractice.length){ panelEmpty.style.display='block'; panelEmpty.textContent='No notes yet \u2014 fill in some lessons first!'; }
}

document.addEventListener('keydown',function(e){ if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveNotes(); } });
loadNotes();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuanle Zhou — Class Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --accent: #C8553D;
    --accent-light: #F5E8E4;
    --text: #1A1A18;
    --muted: #7A7870;
    --border: #E2DED6;
    --input-bg: #F7F5F0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--text);
    color: #fff;
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.18;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 30%;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.10;
  }

  .header-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  header h1 span { color: var(--accent); }

  .header-meta {
    display: flex;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.8);
  }

  .badge strong { color: #fff; font-weight: 500; }

  main { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .month-group { margin-bottom: 24px; }

  .month-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 100px;
    padding: 2px 10px;
    font-weight: 500;
  }

  .class-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 16px;
    align-items: center;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .class-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    border-color: #ccc;
  }

  .class-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 85, 61, 0.12);
  }

  .date-info { display: flex; flex-direction: column; gap: 2px; }

  .date-main {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .date-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    margin-bottom: 1px;
  }

  .notes-area {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--text);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    resize: none;
    min-height: 36px;
    line-height: 1.5;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .notes-area:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
  }

  .notes-area::placeholder { color: #B5B2AB; }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .btn-save {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 100px;
    padding: 11px 28px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-save:hover { opacity: 0.88; }
  .btn-save:active { transform: scale(0.97); }

  .btn-print {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 11px 28px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .btn-print:hover { background: var(--border); color: var(--text); }

  .saved-toast {
    font-size: 13px;
    color: #3A7D44;
    background: #EAF5EC;
    border-radius: 100px;
    padding: 6px 16px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .saved-toast.show { opacity: 1; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 32px;
    border-top: 1px solid var(--border);
  }

  .summary-section {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 2px solid var(--text);
  }
  .summary-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
  }
  .summary-meta { font-size: 12px; color: var(--muted); }
  .summary-empty {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 14px;
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }
  .summary-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 16px;
    align-items: baseline;
  }
  .summary-date { font-size: 13px; font-weight: 500; color: var(--text); }
  .summary-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .summary-note-text { font-size: 12px; font-weight: 300; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
  .btn-summary {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 11px 28px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-summary:hover { background: var(--border); color: var(--text); }
  .ai-summary-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 24px;
  }
  .ai-summary-box h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ai-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 100px;
  }
  .ai-summary-text {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  .ai-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .ai-keyword {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 100px;
  }
  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }
  .ai-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page-layout {
    display: flex;
    align-items: stretch;
    width: 100%;
    gap: 0;
  }

  main {
    flex: 1;
    min-width: 0;
    padding: 24px 24px 60px;
  }

  .summary-panel {
    width: 360px;
    flex-shrink: 0;
    background: var(--card);
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
  }

  .btn-refresh {
    font-size: 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.3s;
    line-height: 1;
  }

  .btn-refresh:hover { background: var(--bg); color: var(--text); }
  .btn-refresh.spinning { animation: spin 0.6s linear; }

  .panel-empty {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    text-align: center;
    padding: 20px 0;
  }

  .panel-section {
    margin-bottom: 20px;
  }

  .panel-section-title {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .panel-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 12.5px;
    font-weight: 300;
    color: var(--text);
    background: var(--bg);
    gap: 8px;
  }

  .panel-item.done {
    background: #EAF5EC;
    color: #2A6B35;
  }

  .panel-item-label { flex: 1; line-height: 1.4; }

  .panel-count {
    font-size: 12px;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 100px;
    padding: 1px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .panel-item.done .panel-count {
    background: #C8EDD0;
    color: #2A6B35;
  }

  .panel-item.planned {
    background: #EEF4FF;
    color: #1A3A7A;
  }

  .panel-count.planned-count {
    background: #C8D8F5;
    color: #1A3A7A;
  }

  .panel-item.planned {
    background: #EEF4FF;
    color: #2A4A8A;
  }

  .panel-count.planned-count {
    background: #C8D8F5;
    color: #2A4A8A;
  }

  .autocomplete-wrap { position: relative; flex: 1; }
  .autocomplete-suggestion {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    padding: 6px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: transparent;
    pointer-events: none;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
    border: 1px solid transparent;
    border-radius: 6px;
    box-sizing: border-box;
    overflow: hidden;
  }
  .autocomplete-suggestion span {
    color: #B5B2AB;
  }

  .fab-save {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 999;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 14px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(200,85,61,0.4);
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fab-save:hover {
    opacity: 0.92;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(200,85,61,0.5);
  }
  .fab-save:active { transform: scale(0.96); }
  .fab-save .fab-icon { font-size: 15px; }
  .fab-toast {
    position: fixed;
    bottom: 90px;
    right: 32px;
    z-index: 999;
    background: var(--text);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 8px 18px;
    border-radius: 100px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }
  .fab-toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 860px) {
    .page-layout { flex-direction: column; }
    .summary-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); position: static; max-height: none; }
    main { max-width: 100%; }
  }

  @media (max-width: 520px) {
    header { padding: 32px 20px 28px; }
    main { padding: 28px 16px 60px; }
    .class-card { grid-template-columns: 1fr; gap: 10px; }
    .summary-row { grid-template-columns: 1fr; gap: 4px; }
    .actions { flex-wrap: wrap; }
  }

  @media print {
    header { background: #fff; color: #000; }
    header h1 span { color: var(--accent); }
    .btn-save, .btn-print, .actions { display: none; }
    .class-card { break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <h1>Xuanle<br><span>Class Schedule</span></h1>
        <div class="header-meta">
          <span class="badge"><strong>21</strong> sessions booked</span>
          <span class="badge"><strong>Apr 23</strong> — <strong>May 25, 2026</strong></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-top:8px;">
        <button onclick="saveNotes()" style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#fff;background:var(--accent);border:none;border-radius:100px;padding:10px 24px;cursor:pointer;opacity:1;transition:opacity 0.2s;">Save notes</button>
        <span class="saved-toast" id="toast-top" style="color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.15);opacity:0;"></span>
      </div>
    </div>
  </div>
</header>

<div class="page-layout">
  <main>
    <div id="schedule"></div>
    <div class="actions">
      <button class="btn-save" onclick="saveNotes()">Save notes</button>
      <button class="btn-print" onclick="window.print()">Print / PDF</button>
      <span class="saved-toast" id="toast">Notes saved!</span>
      <span class="saved-toast" id="load-status" style="opacity:0;"></span>
    </div>
  </main>

  <aside class="summary-panel" id="summary-panel">
    <div class="panel-header">
      <div class="panel-title">Progress tracker</div>
      <button class="btn-refresh" onclick="buildSummary()" title="Refresh">&#8635;</button>
    </div>
    <div class="panel-empty" id="panel-empty">Hit refresh to scan your notes.</div>
    <div id="panel-list"></div>
  </aside>
</div>

<footer>Xuanle Zhou · Class Schedule · Last updated <span id="today"></span></footer>

<script>
const classes = [
  { date: "Apr 23, 2026", day: "Thursday", time: "6:00 AM",  key: "20260423_6am" },
  { date: "Apr 23, 2026", day: "Thursday", time: "5:00 PM",  key: "20260423_5pm" },
  { date: "Apr 26, 2026", day: "Sunday",   time: "6:00 AM",  key: "20260426" },
  { date: "Apr 27, 2026", day: "Monday",   time: "6:00 AM",  key: "20260427" },
  { date: "Apr 29, 2026", day: "Wednesday",time: "6:00 AM",  key: "20260429" },
  { date: "Apr 30, 2026", day: "Thursday", time: "5:00 PM",  key: "20260430" },
  { date: "May 1, 2026",  day: "Friday",   time: "12:00 PM", key: "20260501" },
  { date: "May 3, 2026",  day: "Sunday",   time: "6:00 AM",  key: "20260503" },
  { date: "May 4, 2026",  day: "Monday",   time: "6:00 AM",  key: "20260504" },
  { date: "May 6, 2026",  day: "Wednesday",time: "6:00 AM",  key: "20260506" },
  { date: "May 7, 2026",  day: "Thursday", time: "5:00 PM",  key: "20260507" },
  { date: "May 10, 2026", day: "Sunday",   time: "8:00 AM",  key: "20260510" },
  { date: "May 11, 2026", day: "Monday",   time: "6:00 AM",  key: "20260511" },
  { date: "May 13, 2026", day: "Wednesday",time: "6:00 AM",  key: "20260513" },
  { date: "May 14, 2026", day: "Thursday", time: "6:00 PM",  key: "20260514" },
  { date: "May 17, 2026", day: "Sunday",   time: "8:00 AM",  key: "20260517" },
  { date: "May 18, 2026", day: "Monday",   time: "6:00 AM",  key: "20260518" },
  { date: "May 20, 2026", day: "Wednesday",time: "6:00 AM",  key: "20260520" },
  { date: "May 21, 2026", day: "Thursday", time: "5:00 PM",  key: "20260521" },
  { date: "May 24, 2026", day: "Sunday",   time: "8:00 AM",  key: "20260524" },
  { date: "May 25, 2026", day: "Monday",   time: "6:00 AM",  key: "20260525" },
];

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEhyAPHydRU4xN3Iyqfwq2qvqzPsAZTg0A1oY8nqM35_oNBRJd5Gd3V9Gfyh_ykf_g/exec';
let notes = {};

function loadNotes() {
  const status = document.getElementById('load-status');
  status.textContent = 'Loading…';
  status.style.opacity = '1';

  // Load from cache instantly while waiting for Google
  try {
    const cached = localStorage.getItem('xz_notes_cache');
    if (cached) {
      notes = JSON.parse(cached);
    }
  } catch(e) {}

  // Always fetch fresh from Google, then re-render
  const cbName = 'cb_load_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(fresh) {
    notes = fresh;
    localStorage.setItem('xz_notes_cache', JSON.stringify(notes));
    renderSchedule();
    status.textContent = 'Synced ✓';
    setTimeout(() => { status.style.opacity = '0'; }, 2000);
    delete window[cbName];
    script.remove();
  };
  script.onerror = function() {
    renderSchedule();
    status.textContent = 'Loaded from cache';
    setTimeout(() => { status.style.opacity = '0'; }, 2000);
  };
  // Fallback: if Google takes too long, render with cache
  setTimeout(() => {
    if (window[cbName]) {
      delete window[cbName];
      renderSchedule();
      status.textContent = 'Loaded from cache';
      setTimeout(() => { status.style.opacity = '0'; }, 2000);
    }
  }, 5000);
  script.src = SCRIPT_URL + '?callback=' + cbName + '&t=' + Date.now();
  document.head.appendChild(script);
}

document.getElementById('today').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

// Load from Google first, then render
function renderSchedule() {
  const weeks = groupByWeek(classes);
  const container = document.getElementById('schedule');
  container.innerHTML = '';
  weeks.forEach(({ label, items }) => {
    const group = document.createElement('div');
    group.className = 'month-group';
    group.innerHTML = '<div class="month-title">' + label + ' <span class="month-count">' + items.length + ' class' + (items.length > 1 ? 'es' : '') + '</span></div>';

    const grid = document.createElement('div');
    const cols = Math.min(items.length, 3); grid.style.cssText = 'display:grid;grid-template-columns:repeat(' + cols + ',1fr);gap:8px;';

    items.forEach(c => {
      const col = document.createElement('div');
      col.style.cssText = 'background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:140px;';
      col.innerHTML =
        '<div style="font-size:11px;font-weight:500;color:var(--text)"><span class="dot"></span>' + c.date + '</div>' +
        '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">' + c.day + ' · ' + c.time + '</div>' +
        '<textarea class="notes-area" id="note_' + c.key + '" placeholder="Notes…" style="flex:1;min-height:120px;resize:none;overflow:hidden;">' + (notes[c.key] || '') + '</textarea>';
      const ta = col.querySelector('textarea');
      const wrap = document.createElement('div');
      wrap.className = 'autocomplete-wrap';
      const suggestion = document.createElement('div');
      suggestion.className = 'autocomplete-suggestion';
      wrap.appendChild(ta);
      wrap.appendChild(suggestion);

      ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
        suggestion.style.height = this.style.height;
        showSuggestion(this, suggestion);
        liveScan();
      });

      ta.addEventListener('keydown', function(e) {
        if (e.key === 'Tab' && ta._suggestion) {
          e.preventDefault();
          // Replace the last segment (after last newline or comma)
          const value = this.value;
          const lastDelim = Math.max(value.lastIndexOf('\n'), value.lastIndexOf(','));
          if (lastDelim === -1) {
            this.value = ta._suggestion;
          } else {
            const before = value.slice(0, lastDelim + 1);
            const spacing = value.slice(lastDelim + 1).match(/^\s*/)[0];
            this.value = before + spacing + ta._suggestion;
          }
          ta._suggestion = null;
          suggestion.innerHTML = '';
          this.style.height = 'auto';
          this.style.height = this.scrollHeight + 'px';
          liveScan();
        }
      });

      setTimeout(() => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }, 0);
      col.appendChild(wrap);
      grid.appendChild(col);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });
}

function groupByWeek(arr) {
  const weeks = [];
  const weekMap = {};
  arr.forEach(c => {
    const d = new Date(c.date);
    const day = d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const key = monday.toISOString().slice(0, 10);
    const label = 'Week of ' + fmt(monday) + ' – ' + fmt(sunday);
    if (!weekMap[key]) {
      weekMap[key] = { label, items: [] };
      weeks.push(weekMap[key]);
    }
    weekMap[key].items.push(c);
  });
  return weeks;
}

function saveNotes() {
  classes.forEach(c => {
    const el = document.getElementById('note_' + c.key);
    if (el) notes[c.key] = el.value;
  });

  // Save to localStorage instantly — feels immediate
  localStorage.setItem('xz_notes_cache', JSON.stringify(notes));

  // Show saved immediately without waiting for Google
  const toast = document.getElementById('toast');
  toast.textContent = 'Notes saved! ✓';
  toast.classList.add('show');
  setTimeout(() => { toast.classList.remove('show'); }, 2000);
  const toastTop = document.getElementById('toast-top');
  if (toastTop) { toastTop.textContent = 'Saved! ✓'; toastTop.style.opacity = '1'; setTimeout(() => { toastTop.style.opacity = '0'; }, 2000); }
  const fabToast = document.getElementById('fab-toast');
  if (fabToast) { fabToast.classList.add('show'); setTimeout(() => fabToast.classList.remove('show'), 2000); }

  // Sync to Google Sheet silently in background
  const cbName = 'cb_save_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function() { delete window[cbName]; script.remove(); };
  script.onerror = function() { delete window[cbName]; script.remove(); };
  const encoded = encodeURIComponent(JSON.stringify(notes));
  script.src = SCRIPT_URL + '?action=save&data=' + encoded + '&callback=' + cbName;
  document.head.appendChild(script);
}

const AC_TERMS = [];
KEYWORDS.forEach(kw => {
  kw.terms.forEach(term => {
    AC_TERMS.push({ term, label: kw.label });
  });
});

function showSuggestion(ta, suggEl) {
  const value = ta.value;
  // Get the current word/phrase being typed — split by newline AND comma
  const segments = value.split(/[\n,]/);
  const currentSegment = segments[segments.length - 1].toLowerCase().trim();
  if (currentSegment.length < 2) { suggEl.innerHTML = ''; ta._suggestion = null; return; }

  // Try matching against terms first, then labels
  const match = AC_TERMS.find(t => t.term.startsWith(currentSegment) && t.term !== currentSegment);
  const labelMatch = !match && KEYWORDS.find(kw => kw.label.toLowerCase().startsWith(currentSegment) && kw.label.toLowerCase() !== currentSegment);
  const best = match ? match.term : (labelMatch ? labelMatch.label : null);

  if (best) {
    const rest = best.slice(currentSegment.length);
    // Rebuild display: everything before current segment + current segment + ghost
    const beforeSegment = value.slice(0, value.length - segments[segments.length-1].length);
    const typedPart = segments[segments.length - 1]; // preserve original casing/spacing
    suggEl.innerHTML = escHtml(beforeSegment) + escHtml(typedPart) + '<span>' + escHtml(rest) + '</span>';
    ta._suggestion = best;
  } else {
    suggEl.innerHTML = ''; ta._suggestion = null;
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function liveScan() {
  const panelList = document.getElementById('panel-list');
  if (!panelList.hasChildNodes()) return;
  buildSummary();
}

function kwMatches(kw, noteText) {
  return kw.terms.some(term => {
    const base = term.replace(/s$/, '');
    const regex = new RegExp('\\b' + base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + 's?\\b', 'i');
    return regex.test(noteText);
  });
}

function buildSummary() {
  const btn = document.querySelector('.btn-refresh');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 600);

  const panelEmpty = document.getElementById('panel-empty');
  const panelList = document.getElementById('panel-list');
  panelList.innerHTML = '';
  panelEmpty.style.display = 'none';

  const now = new Date();

  // Parse class date+time and compare to right now
  function parseClassTime(c) {
    const parts = c.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!parts) return new Date(c.date);
    let hours = parseInt(parts[1]);
    const mins = parseInt(parts[2]);
    const ampm = parts[3].toUpperCase();
    if (ampm === 'PM' && hours !== 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;
    const d = new Date(c.date);
    d.setHours(hours, mins, 0, 0);
    return d;
  }

  const pastClasses = classes.filter(c => parseClassTime(c) <= now);
  const futureClasses = classes.filter(c => parseClassTime(c) > now);

  const practiced = [];
  const toPractice = [];
  const notYet = [];

  KEYWORDS.forEach(kw => {
    const practicedCount = pastClasses.filter(c => {
      const noteText = (notes[c.key] || '').toLowerCase();
      return noteText.trim() && kwMatches(kw, noteText);
    }).length;

    const plannedCount = futureClasses.filter(c => {
      const el = document.getElementById('note_' + c.key);
      const noteText = (el ? el.value : (notes[c.key] || '')).toLowerCase();
      return noteText.trim() && kwMatches(kw, noteText);
    }).length;

    if (practicedCount > 0) {
      practiced.push({ label: kw.label, count: practicedCount });
    } else if (plannedCount > 0) {
      toPractice.push({ label: kw.label, count: plannedCount });
    } else {
      notYet.push({ label: kw.label });
    }
  });

  const makeSection = (title, items, itemClass, countClass) => {
    if (items.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'panel-section';
    sec.innerHTML = '<div class="panel-section-title">' + title + ' (' + items.length + ')</div>';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'panel-item ' + itemClass;
      el.innerHTML = '<span class="panel-item-label">' + item.label + '</span>' +
        (item.count ? '<span class="panel-count ' + countClass + '">' + item.count + 'x</span>' : '');
      sec.appendChild(el);
    });
    panelList.appendChild(sec);
  };

  makeSection('Practiced', practiced.sort((a,b) => b.count - a.count), 'done', '');
  makeSection('To practice', toPractice, 'planned', 'planned-count');
  makeSection('Not yet', notYet, '', '');

  if (practiced.length === 0 && toPractice.length === 0 && notYet.length === 30) {
    panelEmpty.style.display = 'block';
    panelEmpty.textContent = 'No notes yet — fill in some lessons first!';
  }
}
